<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Command — Open Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee; --surface: #fff; --border: #e6e1d4;
  --text: #1a1814; --text-2: #5e5852; --muted: #9a9288;
  --accent: #2a5c45;
  --green: #2a8a5a; --green-soft: #e7f1ea;
  --amber: #c4860a; --amber-soft: #f8efd9;
  --red: #b8253b;   --red-soft: #fbe6ea;
  --done: #1a5e3e;  --done-soft: #e0eae4;
  --grey: #7d766f;  --grey-soft: #ede9e0;
  --target-pct: 65;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.header { background: var(--text); padding: 22px 36px; display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.logo { font-family: 'DM Serif Display', serif; font-size: 21px; color: #fff; letter-spacing: -0.02em; }
.logo span { color: #8fba9f; }
.page-title { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.15); padding-left: 14px; }
.header-meta { font-size: 12px; color: rgba(255,255,255,0.55); }

.main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 64px; }

/* Portfolio hero */
.hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; margin-bottom: 18px; }
.hero-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
.hero-num { font-family: 'DM Serif Display', serif; font-size: 64px; line-height: 0.9; }
.hero-num.green { color: var(--green); }
.hero-num.amber { color: var(--amber); }
.hero-num.red   { color: var(--red); }
.hero-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.hero-target { font-size: 13px; color: var(--text-2); }
.hero-target strong { color: var(--text); font-weight: 600; }
.hero-bar { height: 10px; background: var(--bg); border-radius: 100px; overflow: hidden; position: relative; }
.hero-bar-fill { height: 100%; border-radius: 100px; transition: width 0.4s; }
.hero-bar-fill.green { background: var(--green); }
.hero-bar-fill.amber { background: var(--amber); }
.hero-bar-fill.red   { background: var(--red); }
.hero-bar-target { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); }
.hero-bar-target::after { content: '65%'; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text); font-weight: 600; white-space: nowrap; }
.hero-foot { display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: var(--text-2); margin-top: 16px; }
.hero-foot strong { color: var(--text); font-weight: 600; }

/* Stat strip */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 32px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
.stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.stat.green  .stat-dot { background: var(--green); }
.stat.amber  .stat-dot { background: var(--amber); }
.stat.red    .stat-dot { background: var(--red); }
.stat.over   .stat-dot { background: var(--red); box-shadow: 0 0 0 4px var(--red-soft); }
.stat-body { flex: 1; min-width: 0; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 26px; line-height: 1; }
.stat.green .stat-num  { color: var(--green); }
.stat.amber .stat-num  { color: var(--amber); }
.stat.red   .stat-num,
.stat.over  .stat-num  { color: var(--red); }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }

/* Sections */
.section { margin-bottom: 26px; }
.section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; cursor: pointer; user-select: none; }
.section-head:hover .section-toggle { color: var(--text); }
.section-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
.section-title.red   { color: var(--red); }
.section-title.amber { color: var(--amber); }
.section-title.green { color: var(--green); }
.section-title.grey  { color: var(--grey); }
.section-count { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; }
.section-toggle { margin-left: auto; font-size: 12px; color: var(--muted); }
.section-body.collapsed { display: none; }

/* Project rows */
.proj-wrap { margin-bottom: 6px; }
.proj { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px 14px 18px; display: grid; grid-template-columns: 10px 1fr auto auto auto 22px; gap: 18px; align-items: center; transition: border-color 0.12s, box-shadow 0.12s; cursor: pointer; }
.proj:hover { border-color: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.proj-wrap.expanded .proj { border-radius: 10px 10px 0 0; border-bottom-color: var(--border); }
.proj-expand { font-size: 13px; color: var(--muted); text-align: center; transition: transform 0.15s; }
.proj-wrap.expanded .proj-expand { transform: rotate(90deg); color: var(--text); }
.proj-name-link { color: inherit; text-decoration: none; }
.proj-name-link:hover { text-decoration: underline; }
.proj-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--grey-soft); color: var(--grey); margin-left: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

.subs { background: var(--bg); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 10px 14px 12px; }
.subs-head { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 6px 4px; }
.sub-row { display: grid; grid-template-columns: 8px 1fr auto auto; gap: 14px; align-items: center; padding: 8px 4px; border-top: 1px solid var(--border); font-size: 12.5px; }
.sub-row:first-of-type { border-top: none; }
.sub-dot { width: 6px; height: 6px; border-radius: 50%; }
.sub-row.green .sub-dot { background: var(--green); }
.sub-row.amber .sub-dot { background: var(--amber); }
.sub-row.red   .sub-dot { background: var(--red); }
.sub-row.done  .sub-dot { background: var(--done); }
.sub-row.grey  .sub-dot { background: var(--grey); }
.sub-name { color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub-pct { font-weight: 600; font-variant-numeric: tabular-nums; }
.sub-row.green .sub-pct { color: var(--green); }
.sub-row.amber .sub-pct { color: var(--amber); }
.sub-row.red   .sub-pct { color: var(--red); }
.sub-row.done  .sub-pct { color: var(--done); }
.sub-money { font-size: 11px; color: var(--text-2); text-align: right; min-width: 130px; }
.sub-money strong { color: var(--text); font-weight: 600; }
.sub-money.over strong { color: var(--red); }
.subs-empty { font-size: 12px; color: var(--muted); padding: 8px 4px; }
.proj-dot { width: 8px; height: 8px; border-radius: 50%; align-self: center; }
.proj.green .proj-dot { background: var(--green); }
.proj.amber .proj-dot { background: var(--amber); }
.proj.red   .proj-dot { background: var(--red); }
.proj.done  .proj-dot { background: var(--done); }
.proj-name { font-size: 14px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-margin { display: flex; align-items: baseline; gap: 6px; }
.proj-margin-num { font-family: 'DM Serif Display', serif; font-size: 22px; }
.proj.green .proj-margin-num { color: var(--green); }
.proj.amber .proj-margin-num { color: var(--amber); }
.proj.red   .proj-margin-num { color: var(--red); }
.proj.done  .proj-margin-num { color: var(--done); }
.proj-margin-vs { font-size: 11px; color: var(--muted); }
.proj-drift { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.proj.green .proj-drift { background: var(--green-soft); color: var(--green); }
.proj.amber .proj-drift { background: var(--amber-soft); color: var(--amber); }
.proj.red   .proj-drift { background: var(--red-soft);   color: var(--red); }
.proj.done  .proj-drift { background: var(--done-soft);  color: var(--done); }
.proj-budget { font-size: 12px; color: var(--text-2); text-align: right; min-width: 140px; }
.proj-budget strong { font-weight: 600; color: var(--text); }
.proj-budget.over strong { color: var(--red); }

@media (max-width: 760px) {
  .header { padding: 18px 20px; }
  .main { padding: 20px 14px 48px; }
  .hero-num { font-size: 48px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .proj { grid-template-columns: 8px 1fr auto 22px; row-gap: 6px; }
  .proj-drift, .proj-budget { grid-column: 2 / 5; text-align: left; min-width: 0; }
  .sub-row { grid-template-columns: 8px 1fr auto; }
  .sub-money { grid-column: 2 / 4; text-align: left; min-width: 0; }
}

/* Refresh / toolbar */
.toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
.refresh-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.refresh-btn:hover { background: var(--accent); color: #fff; }
.spin { display: inline-block; }
.refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Token gate */
.token-gate { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 36px; max-width: 480px; margin: 60px auto; }
.token-gate h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 10px; }
.token-gate p { font-size: 14px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; }
.token-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); margin-bottom: 12px; outline: none; }
.token-input:focus { border-color: var(--accent); }
.token-submit { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 10px 24px; border-radius: 7px; border: none; background: var(--accent); color: #fff; cursor: pointer; width: 100%; }
.token-submit:hover { opacity: 0.88; }
.token-hint { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.5; }
.token-hint a { color: var(--accent); }

.state-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; }
.state-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
.state-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.state-sub { font-size: 13px; color: var(--text-2); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline;gap:14px">
    <div class="logo">Open <span>Book</span></div>
    <div class="page-title">Portfolio Command</div>
  </div>
  <div class="header-meta" id="last-updated">—</div>
</div>

<div class="main" id="main-content"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const BUDGET_BOARD_ID   = '18397542356';   // Budget Forecast Board (sold/plan/burn margins)
const TIMELY_BOARD_ID   = '18413069222';   // Timely Sync Board (live spend, manual health)
const TIMELY_SUBITEMS   = '18413069226';   // Timely Sync subitems (per-deliverable health)
const ACTIVE_GROUP_ID   = 'topics';
const CLOSED_GROUP_ID   = 'group_mm25j958';
const TIMELY_CLOSED_ID  = 'group_mm3b1mqh';
const STORAGE_KEY       = 'ob_monday_token';
const TARGET_MARGIN     = 65;              // Portfolio aggregate target

// Tripwires: drift from sold margin (in percentage points)
const DRIFT_YELLOW = 5;   // 5–10pp below sold → watch
const DRIFT_RED    = 10;  // >10pp below sold  → needs attention

// Column IDs
const COL = {
  // Budget Forecast (parent)
  health:       'color_mm01dd05',
  soldMargin:   'numeric_mm3g9g4f',
  planMargin:   'numeric_mm2eqtbd',
  burnMargin:   'numeric_mm1q9gdm',
  totalBudget:  'numeric_mm01fpy9',
  spend:        'numeric_mm01p0yd',
  pctComplete:  'numeric_mm1qybw0',
  // Timely Sync (parent)
  tmHealth:     'color_mm01dd05',
  tmBudget:     'numeric_mm01fpy9',
  tmSpend:      'numeric_mm01p0yd',
  tmOverBy:     'numeric_mm3b5bf7',
  // Timely Sync (subitems)
  subHealth:    'color_mm3bgw2v',
  subBudget:    'numeric_mm3aab02',
  subSpent:     'numeric_mm3a5nfj',
  subPctUsed:   'formula_mm3anrq7',
  subHours:     'numeric_mm3a76ma',
};

// ── MONDAY API ───────────────────────────────────────────────────────────
async function apiCall(token, query, variables = {}) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': token, 'API-Version': '2024-01' },
    body: JSON.stringify({ query, variables }),
  });
  if (!r.ok) throw new Error('Monday API error: ' + r.status);
  const d = await r.json();
  if (d.errors) throw new Error(d.errors[0].message);
  return d;
}

async function fetchBoardItems(token, boardId, columnIds) {
  const colIds = JSON.stringify(columnIds);
  const query = `query($boardId:ID!,$cursor:String){
    boards(ids:[$boardId]){
      items_page(limit:100,cursor:$cursor){
        cursor
        items{ id name url group{id title}
          column_values(ids:${colIds}){ id text value }
        }
      }
    }
  }`;
  let all = [], cursor = null, page = 0;
  while (page < 5) {
    const data = await apiCall(token, query, { boardId, cursor });
    const ip = data.data.boards[0].items_page;
    all = all.concat(ip.items);
    cursor = ip.cursor;
    page++;
    if (!cursor) break;
  }
  return all;
}

// Fetch subitems and group them by their parent item id.
async function fetchSubitemsByParent(token, boardId, columnIds) {
  const colIds = JSON.stringify(columnIds);
  // The subitems board has a hidden 'parent_item' column on every row, but we
  // can get the linkage cleanly by querying the parent board's items + subitems.
  const query = `query($boardId:ID!,$cursor:String){
    boards(ids:[$boardId]){
      items_page(limit:100,cursor:$cursor){
        cursor
        items{ id name
          subitems{ id name
            column_values(ids:${colIds}){ id text value }
          }
        }
      }
    }
  }`;
  let map = {}, cursor = null, page = 0;
  while (page < 5) {
    const data = await apiCall(token, query, { boardId, cursor });
    const ip = data.data.boards[0].items_page;
    for (const item of ip.items) {
      map[item.id] = item.subitems || [];
    }
    cursor = ip.cursor;
    page++;
    if (!cursor) break;
  }
  return map;
}

// ── PROCESSING ───────────────────────────────────────────────────────────
function num(cv) {
  if (!cv || cv.text === null || cv.text === undefined || cv.text === '') return null;
  const n = parseFloat(String(cv.text).replace(/[$,%\s]/g, ''));
  return isNaN(n) ? null : n;
}

// Normalize a project name for matching across boards
function normName(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function processBudgetItem(item) {
  const c = {};
  for (const cv of item.column_values) c[cv.id] = cv;
  const sold   = num(c[COL.soldMargin]);
  const plan   = num(c[COL.planMargin]);
  const burn   = num(c[COL.burnMargin]);
  let current = null;
  if (plan !== null && burn !== null) current = Math.min(plan, burn);
  else if (plan !== null) current = plan;
  else if (burn !== null) current = burn;
  return {
    id: item.id, name: item.name, url: item.url, group: item.group?.id,
    sold, current,
    budget: num(c[COL.totalBudget]),
    spend:  num(c[COL.spend]),
    pctDone: num(c[COL.pctComplete]),
    health: c[COL.health]?.text || '',
  };
}

function processTimelyItem(item) {
  const c = {};
  for (const cv of item.column_values) c[cv.id] = cv;
  return {
    id: item.id, name: item.name, url: item.url, group: item.group?.id,
    health: c[COL.tmHealth]?.text || '',
    budget: num(c[COL.tmBudget]),
    spend:  num(c[COL.tmSpend]),
    overBy: num(c[COL.tmOverBy]),
  };
}

function processSubitem(sub) {
  const c = {};
  for (const cv of sub.column_values) c[cv.id] = cv;
  const budget = num(c[COL.subBudget]);
  const spent  = num(c[COL.subSpent]);
  // Compute % used directly — formula columns don't always return text.
  const pctUsed = (budget !== null && budget > 0 && spent !== null) ? (spent / budget * 100) : null;
  return {
    id: sub.id, name: sub.name,
    health: c[COL.subHealth]?.text || '',
    budget, spent,
    remaining: (budget !== null && spent !== null) ? (budget - spent) : null,
    pctUsed,
    hours:   num(c[COL.subHours]),
  };
}

// Merge a Budget Forecast row + matching Timely row (by normalized name)
// into a single project record used by the dashboard.
function mergeProject(bf, tm, subs) {
  const name = bf?.name || tm?.name || '';
  const url  = bf?.url || tm?.url || '#';
  const id   = bf?.id  || tm?.id;
  const group = bf?.group || tm?.group;

  const sold   = bf?.sold ?? null;
  const current = bf?.current ?? null;
  const pctDone = bf?.pctDone ?? null;

  // Prefer Timely's live spend/budget if available — it's the live sync.
  // Fall back to Budget Forecast values.
  const budget = tm?.budget ?? bf?.budget ?? null;
  const spend  = tm?.spend  ?? bf?.spend  ?? null;
  const remaining = (budget !== null && spend !== null) ? (budget - spend) : null;
  const pctSpent  = (budget && budget > 0 && spend !== null) ? (spend / budget * 100) : null;
  const overBudget = remaining !== null && remaining < 0;

  const drift = (sold !== null && current !== null) ? (sold - current) : null;

  // Pending if: no Budget Forecast row at all (Timely-only), OR no sold anchor,
  // OR no current margin, OR barely started (<10% done).
  const pending = !bf
    || sold === null
    || current === null
    || (pctDone !== null && pctDone < 10);

  let status;
  if (pending) status = 'pending';
  else if (overBudget) status = 'red';
  else if (drift !== null && drift > DRIFT_RED) status = 'red';
  else if (drift !== null && drift > DRIFT_YELLOW) status = 'amber';
  else status = 'green';

  return {
    id, name, url, group,
    sold, current, drift, pctDone,
    budget, spend, remaining, pctSpent,
    overBudget, status, pending,
    manualHealth: tm?.health || bf?.health || '',
    hasBudgetForecast: !!bf,
    hasTimely: !!tm,
    subitems: subs || [],
  };
}

function fmtPct(n, digits = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(digits) + '%';
}
function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (abs >= 1000)    return '$' + Math.round(n / 1000) + 'k';
  return '$' + Math.round(n);
}
function fmtMoneySigned(n) {
  if (n === null) return '—';
  return (n < 0 ? '−' : '') + fmtMoney(Math.abs(n));
}

// Weighted portfolio margin: weighted by total budget across active projects with current margin known
function portfolioMargin(projects) {
  let totalBudget = 0;
  let weighted = 0;
  let totalSpend = 0;
  let totalRemaining = 0;
  let countWithMargin = 0;
  for (const p of projects) {
    if (p.budget !== null) {
      totalBudget += p.budget;
      if (p.spend !== null) totalSpend += p.spend;
      if (p.remaining !== null) totalRemaining += p.remaining;
      if (p.current !== null) {
        weighted += p.current * p.budget;
        countWithMargin++;
      }
    }
  }
  const margin = totalBudget > 0 ? (weighted / totalBudget) : null;
  return { margin, totalBudget, totalSpend, totalRemaining, n: projects.length };
}

// ── RENDER ───────────────────────────────────────────────────────────────
function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderTokenGate() {
  const saved = localStorage.getItem(STORAGE_KEY) || '';
  document.getElementById('main-content').innerHTML = `
    <div class="token-gate">
      <h2>Connect to Monday.com</h2>
      <p>Paste your Monday.com API token to load the portfolio. Saved in your browser only — never sent anywhere except Monday's API.</p>
      <input id="token-input" class="token-input" type="password"
        placeholder="eyJhbGciOiJIUzI1NiJ9…" value="${saved}" autocomplete="off">
      <button class="token-submit" onclick="handleTokenSubmit()">Load Portfolio →</button>
      <p class="token-hint">Get your token at <a href="https://monday.com/developers/v2/try-it-yourself" target="_blank">monday.com/developers</a> → Profile → Developers → API token.</p>
    </div>`;
  setTimeout(() => {
    const inp = document.getElementById('token-input');
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleTokenSubmit(); });
  }, 0);
}
function handleTokenSubmit() {
  const token = document.getElementById('token-input')?.value.trim();
  if (!token) return;
  localStorage.setItem(STORAGE_KEY, token);
  loadDashboard(token);
}
function clearToken() { localStorage.removeItem(STORAGE_KEY); renderTokenGate(); }
function renderLoading() {
  document.getElementById('main-content').innerHTML = `
    <div class="state-container">
      <div class="state-spinner"></div>
      <div class="state-title">Pulling portfolio</div>
      <div class="state-sub">Reading Budget Forecast board…</div>
    </div>`;
}
function renderError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="state-container">
      <div class="state-title" style="color:#8b2020">Couldn't load portfolio</div>
      <div class="state-sub" style="margin-bottom:20px">${escape(msg)}</div>
      <button class="token-submit" style="width:auto;padding:10px 24px" onclick="clearToken()">Re-enter token</button>
    </div>`;
}

function renderHero(agg) {
  const m = agg.margin;
  const cls = m === null ? 'red' : (m >= TARGET_MARGIN ? 'green' : m >= TARGET_MARGIN - 5 ? 'amber' : 'red');
  const barPct = m === null ? 0 : Math.max(0, Math.min(100, m));
  const targetMarker = `${TARGET_MARGIN}%`;
  // Target marker positioned at TARGET_MARGIN% of bar width
  return `
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="hero-label">Portfolio margin · active</div>
          <div class="hero-num ${cls}">${fmtPct(m, 1)}</div>
        </div>
        <div class="hero-target">Target <strong>${targetMarker}</strong></div>
      </div>
      <div class="hero-bar">
        <div class="hero-bar-fill ${cls}" style="width:${barPct}%"></div>
        <div class="hero-bar-target" style="left:${TARGET_MARGIN}%"></div>
      </div>
      <div class="hero-foot">
        <div><strong>${agg.n}</strong> assessable project${agg.n === 1 ? '' : 's'}</div>
        <div><strong>${fmtMoney(agg.totalBudget)}</strong> in flight</div>
        <div><strong>${fmtMoney(agg.totalRemaining)}</strong> budget remaining</div>
      </div>
    </div>`;
}

function renderStats(counts, overBudget) {
  return `
    <div class="stats">
      <div class="stat green"><span class="stat-dot"></span><div class="stat-body"><div class="stat-num">${counts.green}</div><div class="stat-label">On track</div></div></div>
      <div class="stat amber"><span class="stat-dot"></span><div class="stat-body"><div class="stat-num">${counts.amber}</div><div class="stat-label">Watch</div></div></div>
      <div class="stat red"><span class="stat-dot"></span><div class="stat-body"><div class="stat-num">${counts.red}</div><div class="stat-label">Needs attention</div></div></div>
      <div class="stat over"><span class="stat-dot"></span><div class="stat-body"><div class="stat-num">${overBudget}</div><div class="stat-label">Over budget</div></div></div>
    </div>`;
}

function driftLabel(drift, overBudget) {
  if (overBudget) return 'Over budget';
  if (drift === null) return null;
  if (drift <= 0) return `+${(-drift).toFixed(0)}pp`;
  return `−${drift.toFixed(0)}pp`;
}

function subitemStatusClass(label) {
  if (!label) return 'grey';
  if (label.includes('🔴') || /over/i.test(label)) return 'red';
  if (label.includes('🟡') || /watch/i.test(label)) return 'amber';
  if (label.includes('🟢') || /^ok|on track/i.test(label)) return 'green';
  if (label.includes('✅') || /complete/i.test(label)) return 'done';
  return 'grey';
}

function renderSubitem(s) {
  const cls = subitemStatusClass(s.health);
  const pctStr = s.pctUsed !== null ? `${Math.round(s.pctUsed)}%` : '—';
  const over = s.remaining !== null && s.remaining < 0;
  const moneyClass = over ? 'sub-money over' : 'sub-money';
  const moneyStr = s.budget === null
    ? '—'
    : over
      ? `Over by <strong>${fmtMoney(-s.remaining)}</strong> · ${fmtMoney(s.budget)} budget`
      : `<strong>${fmtMoney(s.remaining ?? 0)}</strong> of ${fmtMoney(s.budget)} left`;
  return `
    <div class="sub-row ${cls}">
      <span class="sub-dot"></span>
      <span class="sub-name">${escape(s.name)}</span>
      <span class="sub-pct">${pctStr}</span>
      <span class="${moneyClass}">${moneyStr}</span>
    </div>`;
}

function renderProjectRow(p, opts = {}) {
  const cls = opts.cls || p.status;
  const url = p.url || '#';
  const remainStr = p.remaining === null
    ? '—'
    : (p.overBudget ? `Over by <strong>${fmtMoney(-p.remaining)}</strong>` : `<strong>${fmtMoney(p.remaining)}</strong> left`);
  const budgetClass = p.overBudget ? 'proj-budget over' : 'proj-budget';
  const doneStr = p.pctDone !== null ? ` · ${Math.round(p.pctDone)}% done` : '';
  const soldStr = p.sold !== null ? `vs ${Math.round(p.sold)}% sold` : (p.pending ? 'no sold margin' : '');
  const marginStr = p.current !== null ? fmtPct(p.current, 0) : '—';
  const drift = driftLabel(p.drift, p.overBudget);
  const driftChip = drift ? `<span class="proj-drift">${drift}</span>` : `<span></span>`;
  const tmOnly = !p.hasBudgetForecast && p.hasTimely;
  const trackBadge = tmOnly ? `<span class="proj-badge">Timely only</span>` : '';
  const hasSubs = p.subitems && p.subitems.length > 0;
  const expandIcon = hasSubs ? '▸' : '';
  const linkHref = url !== '#' ? url : null;
  const subsHtml = hasSubs
    ? `<div class="subs">
         <div class="subs-head">Deliverables (${p.subitems.length})</div>
         ${p.subitems.map(renderSubitem).join('')}
       </div>`
    : '';

  // The name is a separate link so clicking the name opens Monday,
  // but clicking elsewhere on the row toggles expansion.
  const nameHtml = linkHref
    ? `<a class="proj-name-link" href="${linkHref}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escape(p.name)}</a>${trackBadge}`
    : `${escape(p.name)}${trackBadge}`;

  return `
    <div class="proj-wrap" data-id="${p.id}">
      <div class="proj ${cls}" onclick="toggleProject(this)">
        <span class="proj-dot"></span>
        <span class="proj-name">${nameHtml}</span>
        <span class="proj-margin">
          <span class="proj-margin-num">${marginStr}</span>
          <span class="proj-margin-vs">${soldStr}</span>
        </span>
        ${driftChip}
        <span class="${budgetClass}">${remainStr}${doneStr}</span>
        <span class="proj-expand">${expandIcon}</span>
      </div>
      ${subsHtml ? `<div class="proj-sub-container" style="display:none">${subsHtml}</div>` : ''}
    </div>`;
}

function toggleProject(el) {
  const wrap = el.closest('.proj-wrap');
  if (!wrap) return;
  const container = wrap.querySelector('.proj-sub-container');
  if (!container) return;  // no subitems
  const expanded = wrap.classList.toggle('expanded');
  container.style.display = expanded ? 'block' : 'none';
}

function section(id, title, titleClass, projects, collapsed = false) {
  if (!projects.length) return '';
  return `
    <div class="section">
      <div class="section-head" onclick="toggleSection('${id}')">
        <h2 class="section-title ${titleClass}">${title}</h2>
        <span class="section-count">${projects.length} project${projects.length === 1 ? '' : 's'}</span>
        <span class="section-toggle" id="toggle-${id}">${collapsed ? '▸' : '▾'}</span>
      </div>
      <div class="section-body ${collapsed ? 'collapsed' : ''}" id="body-${id}">
        ${projects.map(p => renderProjectRow(p)).join('')}
      </div>
    </div>`;
}

function toggleSection(id) {
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  if (!body) return;
  const collapsed = body.classList.toggle('collapsed');
  if (toggle) toggle.textContent = collapsed ? '▸' : '▾';
}

function renderDashboard(projects) {
  // Active: anything in either board's Active group
  const isActive = g => g === ACTIVE_GROUP_ID;
  const isClosed = g => g === CLOSED_GROUP_ID || g === TIMELY_CLOSED_ID;
  const active = projects.filter(p => isActive(p.group));
  const closed = projects.filter(p => isClosed(p.group));

  // Sort: worst (highest drift) first within each bucket
  const byDrift = (a, b) => (b.drift ?? -Infinity) - (a.drift ?? -Infinity);
  const red     = active.filter(p => p.status === 'red').sort(byDrift);
  const amber   = active.filter(p => p.status === 'amber').sort(byDrift);
  const green   = active.filter(p => p.status === 'green').sort(byDrift);
  const pending = active.filter(p => p.status === 'pending');
  const counts = { red: red.length, amber: amber.length, green: green.length };
  const overBudget = active.filter(p => p.overBudget).length;
  // Aggregate excludes pending so the portfolio number reflects projects with real data
  const assessable = active.filter(p => !p.pending);
  const agg = portfolioMargin(assessable);

  // Closed: sort by final margin descending (best closes first)
  const closedSorted = closed.slice().sort((a, b) => (b.current ?? -Infinity) - (a.current ?? -Infinity));

  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Updated ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' · ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  document.getElementById('main-content').innerHTML = `
    <div class="toolbar">
      <button class="refresh-btn" id="refresh-btn" onclick="handleRefresh()">
        <span class="spin">↻</span> Refresh
      </button>
    </div>
    ${renderHero(agg)}
    ${renderStats(counts, overBudget)}
    ${section('red',     'Needs attention', 'red',   red,   false)}
    ${section('amber',   'Watch',           'amber', amber, false)}
    ${section('green',   'On track',        'green', green, true)}
    ${section('pending', 'Not yet assessable', 'grey', pending.map(p => ({...p, status: 'done'})), true)}
    ${section('closed',  'Recently closed', 'grey',  closedSorted.map(p => ({...p, status: 'done'})), true)}
  `;
}

async function loadDashboard(token) {
  renderLoading();
  try {
    const budgetCols = [COL.health, COL.soldMargin, COL.planMargin, COL.burnMargin,
                        COL.totalBudget, COL.spend, COL.pctComplete];
    const timelyCols = [COL.tmHealth, COL.tmBudget, COL.tmSpend, COL.tmOverBy];
    const subCols    = [COL.subHealth, COL.subBudget, COL.subSpent, COL.subPctUsed, COL.subHours];

    const [budgetItems, timelyItems, subitemsByParent] = await Promise.all([
      fetchBoardItems(token, BUDGET_BOARD_ID, budgetCols),
      fetchBoardItems(token, TIMELY_BOARD_ID, timelyCols),
      fetchSubitemsByParent(token, TIMELY_BOARD_ID, subCols),
    ]);

    // Process raw rows
    const bfRows = budgetItems.map(processBudgetItem);
    const tmRows = timelyItems.map(processTimelyItem);

    // Index Timely rows by normalized name (active + closed both)
    const tmByName = {};
    for (const tm of tmRows) tmByName[normName(tm.name)] = tm;

    // Build subitem lookup by Timely parent id, processed
    const subsByTmId = {};
    for (const [parentId, subs] of Object.entries(subitemsByParent)) {
      subsByTmId[parentId] = subs.map(processSubitem);
    }

    // Track which Timely rows got matched so we can surface unmatched ones
    const matchedTmIds = new Set();
    const merged = [];

    for (const bf of bfRows) {
      const tm = tmByName[normName(bf.name)] || null;
      if (tm) matchedTmIds.add(tm.id);
      const subs = tm ? (subsByTmId[tm.id] || []) : [];
      merged.push(mergeProject(bf, tm, subs));
    }

    // Timely-only rows (active group) — projects tracked in Timely but not budgeted yet
    for (const tm of tmRows) {
      if (matchedTmIds.has(tm.id)) continue;
      if (tm.group !== ACTIVE_GROUP_ID) continue;
      const subs = subsByTmId[tm.id] || [];
      merged.push(mergeProject(null, tm, subs));
    }

    renderDashboard(merged);
  } catch (e) {
    renderError(e.message || String(e));
  }
}

async function handleRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('loading');
  const token = localStorage.getItem(STORAGE_KEY);
  if (!token) { renderTokenGate(); return; }
  await loadDashboard(token);
}

window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem(STORAGE_KEY);
  if (token) loadDashboard(token);
  else renderTokenGate();
});
</script>
