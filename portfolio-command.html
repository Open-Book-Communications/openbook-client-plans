<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Command — Open Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee; --surface: #fff; --border: #e6e1d4;
  --text: #1a1814; --text-2: #5e5852; --muted: #9a9288;
  --accent: #2a5c45;
  --green: #2a8a5a; --green-soft: #e7f1ea;
  --amber: #c4860a; --amber-soft: #f8efd9;
  --red: #b8253b;   --red-soft: #fbe6ea;
  --done: #1a5e3e;  --done-soft: #e0eae4;
  --grey: #7d766f;  --grey-soft: #ede9e0;
  --target-pct: 65;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.header { background: var(--text); padding: 22px 36px; display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.logo { font-family: 'DM Serif Display', serif; font-size: 21px; color: #fff; letter-spacing: -0.02em; }
.logo span { color: #8fba9f; }
.page-title { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.15); padding-left: 14px; }
.header-meta { font-size: 12px; color: rgba(255,255,255,0.55); }

.main { max-width: 1140px; margin: 0 auto; padding: 28px 24px 56px; }
.row { display: grid; gap: 12px; margin-bottom: 12px; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: repeat(3, 1fr); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; }
.card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 8px; }
.card-label .muted { color: var(--muted); }

/* Margin hero — two side by side */
.margin-card .margin-num { font-family: 'DM Serif Display', serif; font-size: 50px; line-height: 0.95; display: inline-block; vertical-align: baseline; }
.margin-card .margin-vs { font-size: 12px; color: var(--text-2); margin-left: 10px; }
.margin-card .margin-vs strong { color: var(--text); font-weight: 600; }
.margin-card.green .margin-num { color: var(--green); }
.margin-card.amber .margin-num { color: var(--amber); }
.margin-card.red   .margin-num { color: var(--red); }
.timestamp { font-size: 12px; color: var(--muted); text-align: right; padding-right: 4px; }

/* Stat strip — three boxes */
.stat-card { padding: 18px 22px; }
.stat-label { font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 8px; }
.stat-counts { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1; display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap; }
.stat-counts .seg { display: flex; align-items: baseline; gap: 6px; }
.stat-counts .seg.green span:first-child { color: var(--green); }
.stat-counts .seg.amber span:first-child { color: var(--amber); }
.stat-counts .seg.red   span:first-child { color: var(--red); }
.stat-counts .seg span:last-child { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-2); font-weight: 400; }
.stat-money { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; color: var(--text); }
.stat-foot { font-size: 12px; color: var(--text-2); margin-top: 8px; }

/* Needs your attention banner */
.attn { background: #fef5ed; border: 1px solid #f4d8b8; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.attn-icon { font-size: 14px; color: #c4660a; }
.attn-title { font-size: 13px; font-weight: 600; color: var(--text); }
.attn-count { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #fff; color: var(--text-2); border: 1px solid var(--border); }
.attn-count.zero { color: var(--green); border-color: var(--green-soft); background: var(--green-soft); }
.attn-body { flex: 1; font-size: 13px; color: var(--text-2); }
.attn.clear { background: var(--bg); border-color: var(--border); }
.attn.clear .attn-icon { color: var(--green); }
.attn.has-issues { background: #fef5ed; border-color: #f4d8b8; }

/* Margin bar chart */
.chart-card { padding: 22px 26px 12px; margin-bottom: 18px; }
.chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
.chart-wrap { position: relative; height: 220px; display: flex; align-items: stretch; padding-left: 30px; }
.chart-y { position: absolute; left: 0; top: 0; bottom: 22px; width: 26px; display: flex; flex-direction: column-reverse; justify-content: space-between; font-size: 9px; color: var(--muted); }
.chart-y span { line-height: 1; }
.chart-bars { flex: 1; display: flex; align-items: flex-end; gap: 6px; position: relative; padding-bottom: 22px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
.chart-grid { position: absolute; left: 0; right: 0; top: 0; bottom: 22px; pointer-events: none; }
.chart-grid-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); opacity: 0.5; }
.chart-target { position: absolute; left: 0; right: 0; border-top: 1.5px dashed #1a5e3e; pointer-events: none; }
.chart-target::after { content: 'target 65%'; position: absolute; right: 0; top: -15px; font-size: 10px; color: #1a5e3e; font-weight: 500; background: var(--surface); padding: 0 4px; }
.chart-bar { flex: 1; position: relative; min-width: 14px; border-radius: 4px 4px 0 0; transition: opacity 0.15s; cursor: default; }
.chart-bar:hover { opacity: 0.85; }
.chart-bar.green { background: linear-gradient(180deg, #6db981, #4ca16a); }
.chart-bar.amber { background: linear-gradient(180deg, #e5b04a, #c4860a); }
.chart-bar.red   { background: linear-gradient(180deg, #d2536a, #b8253b); }
.chart-bar.grey  { background: linear-gradient(180deg, #b8b2a8, #968f85); }
.chart-bar-name { position: absolute; left: 50%; bottom: -20px; transform: translateX(-50%) rotate(-35deg); transform-origin: top left; font-size: 9px; color: var(--text-2); white-space: nowrap; }
.chart-bar-val { position: absolute; left: 50%; top: -16px; transform: translateX(-50%); font-size: 10px; font-weight: 600; color: var(--text); white-space: nowrap; }
.chart-foot { margin-top: 38px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

/* Sections */
.section { margin-bottom: 22px; }
.section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; cursor: pointer; user-select: none; }
.section-head:hover .section-toggle { color: var(--text); }
.section-title { font-size: 13px; font-weight: 600; color: var(--text); }
.section-count { font-size: 11px; color: var(--muted); font-weight: 500; }
.section-toggle { margin-left: auto; font-size: 11px; color: var(--muted); }
.section-body.collapsed { display: none; }

.proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Project cards — rich 2-col */
.pcard-wrap { position: relative; }
.pcard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px 14px; position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s; }
.pcard:hover { border-color: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.pcard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.pcard.green::before { background: var(--green); }
.pcard.amber::before { background: var(--amber); }
.pcard.red::before   { background: var(--red); }
.pcard.done::before  { background: var(--done); }
.pcard.grey::before  { background: var(--grey); }
.pcard-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.pcard-title-block { min-width: 0; flex: 1; }
.pcard-title { font-size: 14px; font-weight: 600; color: var(--text); }
.pcard-title a { color: inherit; text-decoration: none; }
.pcard-title a:hover { text-decoration: underline; }
.pcard-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.pcard-pills { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
.pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.02em; white-space: nowrap; }
.pill.green { background: var(--green-soft); color: var(--green); }
.pill.amber { background: var(--amber-soft); color: var(--amber); }
.pill.red   { background: var(--red-soft);   color: var(--red); }
.pill.done  { background: var(--done-soft);  color: var(--done); }
.pill.grey  { background: var(--grey-soft);  color: var(--grey); }
.pcard-margin-row { margin-top: 14px; }
.pcard-margin { font-family: 'DM Serif Display', serif; font-size: 40px; line-height: 1; display: inline-block; }
.pcard.green .pcard-margin { color: var(--green); }
.pcard.amber .pcard-margin { color: var(--amber); }
.pcard.red   .pcard-margin { color: var(--red); }
.pcard.done  .pcard-margin { color: var(--done); }
.pcard.grey  .pcard-margin { color: var(--grey); }
.pcard-margin-label { font-size: 11px; color: var(--text-2); margin-left: 8px; }
.pcard-drift { font-size: 11.5px; color: var(--text-2); margin-top: 6px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.pcard-arrow.up   { color: var(--green); font-weight: 700; }
.pcard-arrow.down { color: var(--red); font-weight: 700; }
.pcard-arrow.flat { color: var(--muted); font-weight: 700; }
.pcard-progress-row { margin-top: 12px; }
.pcard-progress-meta { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-2); margin-bottom: 5px; }
.pcard-progress-meta .right { color: var(--muted); }
.pcard-progress { height: 6px; background: var(--bg); border-radius: 100px; overflow: hidden; }
.pcard-progress-fill { height: 100%; border-radius: 100px; transition: width 0.4s; }
.pcard.green .pcard-progress-fill { background: var(--green); }
.pcard.amber .pcard-progress-fill { background: var(--amber); }
.pcard.red   .pcard-progress-fill { background: var(--red); }
.pcard.done  .pcard-progress-fill { background: var(--done); }
.pcard.grey  .pcard-progress-fill { background: var(--grey); }
.pcard-foot { display: flex; gap: 18px; margin-top: 11px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11.5px; }
.pcard-foot-item { display: flex; align-items: baseline; gap: 5px; }
.pcard-foot-item .lbl { color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.pcard-foot-item .val { font-weight: 600; color: var(--text); }
.pcard-foot-item .val.red { color: var(--red); }
.pcard-foot-item .val.muted { color: var(--muted); }
.pcard-expand { position: absolute; top: 10px; right: 10px; font-size: 11px; color: var(--muted); padding: 2px 6px; opacity: 0; transition: opacity 0.15s; }
.pcard:hover .pcard-expand { opacity: 1; }

/* Expanded sub-deliverables sit below the card */
.pcard-subs { background: var(--bg); border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; padding: 10px 14px 12px; margin-top: -4px; }
.pcard-wrap.expanded .pcard { border-bottom-color: var(--border); border-radius: 12px 12px 0 0; }

/* Legacy proj row (kept for backwards compat — not used by main grid now) */
.proj-wrap { margin-bottom: 6px; }
.proj { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px 14px 18px; display: grid; grid-template-columns: 10px 1fr auto auto auto 22px; gap: 18px; align-items: center; transition: border-color 0.12s, box-shadow 0.12s; cursor: pointer; }
.proj:hover { border-color: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.proj-wrap.expanded .proj { border-radius: 10px 10px 0 0; border-bottom-color: var(--border); }
.proj-expand { font-size: 13px; color: var(--muted); text-align: center; transition: transform 0.15s; }
.proj-wrap.expanded .proj-expand { transform: rotate(90deg); color: var(--text); }
.proj-name-link { color: inherit; text-decoration: none; }
.proj-name-link:hover { text-decoration: underline; }
.proj-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--grey-soft); color: var(--grey); margin-left: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

.subs { background: var(--bg); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 10px 14px 12px; }
.subs-head { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 6px 4px; }
.sub-row { display: grid; grid-template-columns: 8px 1fr auto auto; gap: 14px; align-items: center; padding: 8px 4px; border-top: 1px solid var(--border); font-size: 12.5px; }
.sub-row:first-of-type { border-top: none; }
.sub-dot { width: 6px; height: 6px; border-radius: 50%; }
.sub-row.green .sub-dot { background: var(--green); }
.sub-row.amber .sub-dot { background: var(--amber); }
.sub-row.red   .sub-dot { background: var(--red); }
.sub-row.done  .sub-dot { background: var(--done); }
.sub-row.grey  .sub-dot { background: var(--grey); }
.sub-name { color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub-pct { font-weight: 600; font-variant-numeric: tabular-nums; }
.sub-row.green .sub-pct { color: var(--green); }
.sub-row.amber .sub-pct { color: var(--amber); }
.sub-row.red   .sub-pct { color: var(--red); }
.sub-row.done  .sub-pct { color: var(--done); }
.sub-money { font-size: 11px; color: var(--text-2); text-align: right; min-width: 130px; }
.sub-money strong { color: var(--text); font-weight: 600; }
.sub-money.over strong { color: var(--red); }
.subs-empty { font-size: 12px; color: var(--muted); padding: 8px 4px; }
.proj-dot { width: 8px; height: 8px; border-radius: 50%; align-self: center; }
.proj.green .proj-dot { background: var(--green); }
.proj.amber .proj-dot { background: var(--amber); }
.proj.red   .proj-dot { background: var(--red); }
.proj.done  .proj-dot { background: var(--done); }
.proj-name { font-size: 14px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-margin { display: flex; align-items: baseline; gap: 6px; }
.proj-margin-num { font-family: 'DM Serif Display', serif; font-size: 22px; }
.proj.green .proj-margin-num { color: var(--green); }
.proj.amber .proj-margin-num { color: var(--amber); }
.proj.red   .proj-margin-num { color: var(--red); }
.proj.done  .proj-margin-num { color: var(--done); }
.proj-margin-vs { font-size: 11px; color: var(--muted); }
.proj-drift { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.proj.green .proj-drift { background: var(--green-soft); color: var(--green); }
.proj.amber .proj-drift { background: var(--amber-soft); color: var(--amber); }
.proj.red   .proj-drift { background: var(--red-soft);   color: var(--red); }
.proj.done  .proj-drift { background: var(--done-soft);  color: var(--done); }
.proj-budget { font-size: 12px; color: var(--text-2); text-align: right; min-width: 140px; }
.proj-budget strong { font-weight: 600; color: var(--text); }
.proj-budget.over strong { color: var(--red); }

@media (max-width: 880px) {
  .header { padding: 18px 20px; }
  .main { padding: 20px 14px 48px; }
  .row-3 { grid-template-columns: 1fr; }
  .row-2 { grid-template-columns: 1fr; }
  .proj-grid { grid-template-columns: 1fr; }
  .margin-card .margin-num { font-size: 40px; }
  .stat-money { font-size: 26px; }
  .chart-bar-name { font-size: 8px; }
  .sub-row { grid-template-columns: 8px 1fr auto; }
  .sub-money { grid-column: 2 / 4; text-align: left; min-width: 0; }
  .pcard-foot { flex-wrap: wrap; }
}

/* Refresh / toolbar */
.toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
.refresh-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.refresh-btn:hover { background: var(--accent); color: #fff; }
.spin { display: inline-block; }
.refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Token gate */
.token-gate { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 36px; max-width: 480px; margin: 60px auto; }
.token-gate h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 10px; }
.token-gate p { font-size: 14px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; }
.token-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); margin-bottom: 12px; outline: none; }
.token-input:focus { border-color: var(--accent); }
.token-submit { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 10px 24px; border-radius: 7px; border: none; background: var(--accent); color: #fff; cursor: pointer; width: 100%; }
.token-submit:hover { opacity: 0.88; }
.token-hint { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.5; }
.token-hint a { color: var(--accent); }

.state-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; }
.state-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
.state-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.state-sub { font-size: 13px; color: var(--text-2); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline;gap:14px">
    <div class="logo">Open <span>Book</span></div>
    <div class="page-title">Portfolio Command</div>
  </div>
  <div class="header-meta" id="last-updated">—</div>
</div>

<div class="main" id="main-content"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const BUDGET_BOARD_ID   = '18397542356';   // Budget Forecast Board (sold/plan/burn margins)
const TIMELY_BOARD_ID   = '18413069222';   // Timely Sync Board (live spend, manual health)
const TIMELY_SUBITEMS   = '18413069226';   // Timely Sync subitems (per-deliverable health)
const ACTIVE_GROUP_ID   = 'topics';
const CLOSED_GROUP_ID   = 'group_mm25j958';
const TIMELY_CLOSED_ID  = 'group_mm3b1mqh';
const STORAGE_KEY       = 'ob_monday_token';
const TARGET_MARGIN     = 65;              // Portfolio aggregate target

// Tripwires: drift from sold margin (in percentage points)
const DRIFT_YELLOW = 5;   // 5–10pp below sold → watch
const DRIFT_RED    = 10;  // >10pp below sold  → needs attention

// Column IDs
const COL = {
  // Budget Forecast (parent)
  health:       'color_mm01dd05',
  lead:         'multiple_person_mm01yhm6',
  soldMargin:   'numeric_mm3g9g4f',
  planMargin:   'numeric_mm2eqtbd',
  burnMargin:   'numeric_mm1q9gdm',
  totalBudget:  'numeric_mm01fpy9',
  spend:        'numeric_mm01p0yd',
  pctComplete:  'numeric_mm1qybw0',
  // Timely Sync (parent)
  tmHealth:     'color_mm01dd05',
  tmBudget:     'numeric_mm01fpy9',
  tmSpend:      'numeric_mm01p0yd',
  tmOverBy:     'numeric_mm3b5bf7',
  // Timely Sync (subitems)
  subHealth:    'color_mm3bgw2v',
  subBudget:    'numeric_mm3aab02',
  subSpent:     'numeric_mm3a5nfj',
  subPctUsed:   'formula_mm3anrq7',
  subHours:     'numeric_mm3a76ma',
};

// ── MONDAY API ───────────────────────────────────────────────────────────
async function apiCall(token, query, variables = {}) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': token, 'API-Version': '2024-01' },
    body: JSON.stringify({ query, variables }),
  });
  if (!r.ok) throw new Error('Monday API error: ' + r.status);
  const d = await r.json();
  if (d.errors) throw new Error(d.errors[0].message);
  return d;
}

async function fetchBoardItems(token, boardId, columnIds) {
  const colIds = JSON.stringify(columnIds);
  const query = `query($boardId:ID!,$cursor:String){
    boards(ids:[$boardId]){
      items_page(limit:100,cursor:$cursor){
        cursor
        items{ id name url group{id title}
          column_values(ids:${colIds}){ id text value }
        }
      }
    }
  }`;
  let all = [], cursor = null, page = 0;
  while (page < 5) {
    const data = await apiCall(token, query, { boardId, cursor });
    const ip = data.data.boards[0].items_page;
    all = all.concat(ip.items);
    cursor = ip.cursor;
    page++;
    if (!cursor) break;
  }
  return all;
}

// Fetch subitems and group them by their parent item id.
async function fetchSubitemsByParent(token, boardId, columnIds) {
  const colIds = JSON.stringify(columnIds);
  // The subitems board has a hidden 'parent_item' column on every row, but we
  // can get the linkage cleanly by querying the parent board's items + subitems.
  const query = `query($boardId:ID!,$cursor:String){
    boards(ids:[$boardId]){
      items_page(limit:100,cursor:$cursor){
        cursor
        items{ id name
          subitems{ id name
            column_values(ids:${colIds}){ id text value }
          }
        }
      }
    }
  }`;
  let map = {}, cursor = null, page = 0;
  while (page < 5) {
    const data = await apiCall(token, query, { boardId, cursor });
    const ip = data.data.boards[0].items_page;
    for (const item of ip.items) {
      map[item.id] = item.subitems || [];
    }
    cursor = ip.cursor;
    page++;
    if (!cursor) break;
  }
  return map;
}

// ── PROCESSING ───────────────────────────────────────────────────────────
function num(cv) {
  if (!cv || cv.text === null || cv.text === undefined || cv.text === '') return null;
  const n = parseFloat(String(cv.text).replace(/[$,%\s]/g, ''));
  return isNaN(n) ? null : n;
}

// Normalize a project name for matching across boards
function normName(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function processBudgetItem(item) {
  const c = {};
  for (const cv of item.column_values) c[cv.id] = cv;
  const sold   = num(c[COL.soldMargin]);
  const plan   = num(c[COL.planMargin]);
  const burn   = num(c[COL.burnMargin]);
  let current = null;
  if (plan !== null && burn !== null) current = Math.min(plan, burn);
  else if (plan !== null) current = plan;
  else if (burn !== null) current = burn;
  return {
    id: item.id, name: item.name, url: item.url, group: item.group?.id,
    sold, current, plan, burn,
    budget: num(c[COL.totalBudget]),
    spend:  num(c[COL.spend]),
    pctDone: num(c[COL.pctComplete]),
    health: c[COL.health]?.text || '',
    lead:   c[COL.lead]?.text || '',
  };
}

function processTimelyItem(item) {
  const c = {};
  for (const cv of item.column_values) c[cv.id] = cv;
  return {
    id: item.id, name: item.name, url: item.url, group: item.group?.id,
    health: c[COL.tmHealth]?.text || '',
    budget: num(c[COL.tmBudget]),
    spend:  num(c[COL.tmSpend]),
    overBy: num(c[COL.tmOverBy]),
  };
}

function processSubitem(sub) {
  const c = {};
  for (const cv of sub.column_values) c[cv.id] = cv;
  const budget = num(c[COL.subBudget]);
  const spent  = num(c[COL.subSpent]);
  // Compute % used directly — formula columns don't always return text.
  const pctUsed = (budget !== null && budget > 0 && spent !== null) ? (spent / budget * 100) : null;
  return {
    id: sub.id, name: sub.name,
    health: c[COL.subHealth]?.text || '',
    budget, spent,
    remaining: (budget !== null && spent !== null) ? (budget - spent) : null,
    pctUsed,
    hours:   num(c[COL.subHours]),
  };
}

// Merge a Budget Forecast row + matching Timely row (by normalized name)
// into a single project record used by the dashboard.
function mergeProject(bf, tm, subs) {
  const name = bf?.name || tm?.name || '';
  const url  = bf?.url || tm?.url || '#';
  const id   = bf?.id  || tm?.id;
  const group = bf?.group || tm?.group;

  const sold     = bf?.sold ?? null;
  const current  = bf?.current ?? null;
  const planM    = bf?.plan ?? null;
  const burnM    = bf?.burn ?? null;
  const pctDone  = bf?.pctDone ?? null;
  const lead     = bf?.lead ?? '';

  // Contract amount = the original sold budget (from Budget Forecast). Fall
  // back to Timely's budget if no Budget Forecast row exists.
  // Live spend prefers Timely (it's the real-time sync).
  const budget = bf?.budget ?? tm?.budget ?? null;
  const spend  = tm?.spend  ?? bf?.spend  ?? null;
  const remaining = (budget !== null && spend !== null) ? (budget - spend) : null;
  const pctSpent  = (budget && budget > 0 && spend !== null) ? (spend / budget * 100) : null;
  const overBudget = remaining !== null && remaining < 0;

  const drift = (sold !== null && current !== null) ? (sold - current) : null;

  // Pending if: no Budget Forecast row at all (Timely-only), OR no sold anchor,
  // OR no current margin, OR barely started (<10% done).
  const pending = !bf
    || sold === null
    || current === null
    || (pctDone !== null && pctDone < 10);

  let status;
  if (pending) status = 'pending';
  else if (overBudget) status = 'red';
  else if (drift !== null && drift > DRIFT_RED) status = 'red';
  else if (drift !== null && drift > DRIFT_YELLOW) status = 'amber';
  else status = 'green';

  return {
    id, name, url, group, lead,
    sold, current, plan: planM, burn: burnM, drift, pctDone,
    budget, spend, remaining, pctSpent,
    overBudget, status, pending,
    manualHealth: tm?.health || bf?.health || '',
    hasBudgetForecast: !!bf,
    hasTimely: !!tm,
    subitems: subs || [],
  };
}

function fmtPct(n, digits = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(digits) + '%';
}
function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (abs >= 1000)    return '$' + Math.round(n / 1000) + 'k';
  return '$' + Math.round(n);
}
function fmtMoneySigned(n) {
  if (n === null) return '—';
  return (n < 0 ? '−' : '') + fmtMoney(Math.abs(n));
}

// Weighted portfolio margin: weighted by total budget across active projects with current margin known
function portfolioMargin(projects) {
  let totalBudget = 0;
  let weighted = 0;
  let totalSpend = 0;
  let totalRemaining = 0;
  let countWithMargin = 0;
  for (const p of projects) {
    if (p.budget !== null) {
      totalBudget += p.budget;
      if (p.spend !== null) totalSpend += p.spend;
      if (p.remaining !== null) totalRemaining += p.remaining;
      if (p.current !== null) {
        weighted += p.current * p.budget;
        countWithMargin++;
      }
    }
  }
  const margin = totalBudget > 0 ? (weighted / totalBudget) : null;
  return { margin, totalBudget, totalSpend, totalRemaining, n: projects.length };
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderMarginChart(projects) {
  // Sort high-to-low by current (effective) margin. Show only assessable projects.
  const assessable = projects.filter(p => !p.pending && p.current !== null);
  const sorted = assessable.slice().sort((a, b) => (b.current ?? -1) - (a.current ?? -1));
  if (!sorted.length) return '';
  const maxY = 100;
  const targetPct = (TARGET_MARGIN / maxY) * 100;
  const bars = sorted.map(p => {
    const heightPct = Math.max(2, (p.current / maxY) * 100);
    const shortName = p.name.length > 22 ? p.name.slice(0, 20) + '…' : p.name;
    return `
      <div class="chart-bar ${p.status}" style="height: ${heightPct}%" title="${escape(p.name)}: ${fmtPct(p.current, 1)}">
        <div class="chart-bar-val">${Math.round(p.current)}%</div>
        <div class="chart-bar-name">${escape(shortName)}</div>
      </div>`;
  }).join('');
  return `
    <div class="card chart-card">
      <div class="chart-title">Plan margin by project</div>
      <div class="chart-wrap">
        <div class="chart-y">
          <span>0%</span><span>20%</span><span>40%</span><span>60%</span><span>80%</span><span>100%</span>
        </div>
        <div class="chart-bars">
          <div class="chart-target" style="bottom: ${targetPct}%"></div>
          ${bars}
        </div>
      </div>
      <div class="chart-foot">Sorted high to low. Bars colored by drift from sold margin. Dashed line = ${TARGET_MARGIN}% portfolio target.</div>
    </div>`;
}

function driftLabel(drift, overBudget) {
  if (overBudget) return 'Over budget';
  if (drift === null) return null;
  if (drift <= 0) return `+${(-drift).toFixed(0)}pp`;
  return `−${drift.toFixed(0)}pp`;
}

function subitemStatusClass(label) {
  if (!label) return 'grey';
  if (label.includes('🔴') || /over/i.test(label)) return 'red';
  if (label.includes('🟡') || /watch/i.test(label)) return 'amber';
  if (label.includes('🟢') || /^ok|on track/i.test(label)) return 'green';
  if (label.includes('✅') || /complete/i.test(label)) return 'done';
  return 'grey';
}

function renderSubitem(s) {
  const cls = subitemStatusClass(s.health);
  const pctStr = s.pctUsed !== null ? `${Math.round(s.pctUsed)}%` : '—';
  const over = s.remaining !== null && s.remaining < 0;
  const moneyClass = over ? 'sub-money over' : 'sub-money';
  const moneyStr = s.budget === null
    ? '—'
    : over
      ? `Over by <strong>${fmtMoney(-s.remaining)}</strong> · ${fmtMoney(s.budget)} budget`
      : `<strong>${fmtMoney(s.remaining ?? 0)}</strong> of ${fmtMoney(s.budget)} left`;
  return `
    <div class="sub-row ${cls}">
      <span class="sub-dot"></span>
      <span class="sub-name">${escape(s.name)}</span>
      <span class="sub-pct">${pctStr}</span>

}

function healthPillLabel(p) {
  if (p.pending) return { label: 'pending', cls: 'grey' };
  if (p.status === 'red')   return { label: 'attention', cls: 'red' };
  if (p.status === 'amber') return { label: 'watch',     cls: 'amber' };
  if (p.status === 'done')  return { label: 'closed',    cls: 'done' };
  return { label: 'on plan', cls: 'green' };
}

function soldPill(p) {
  if (p.sold === null || p.current === null) return { label: 'no sold', cls: 'grey' };
  if (p.drift === null) return null;
  // drift = sold - current; positive = below sold (bad)
  if (Math.abs(p.drift) <= 1) return { label: '~ sold',  cls: 'grey' };
  if (p.drift < 0)             return { label: '+ sold', cls: 'green' };
  return { label: '− sold', cls: 'red' };
}

function renderProjectCard(p) {
  const cls = p.status;
  const url = p.url || '#';
  const tmOnly = !p.hasBudgetForecast && p.hasTimely;
  const contractStr = p.budget !== null ? fmtMoney(p.budget) : '—';
  const leadStr = p.lead ? p.lead : 'Unassigned';
  const subtitle = `Lead: ${escape(leadStr)} · ${contractStr} contract${tmOnly ? ' · Timely only' : ''}`;

  const healthPill = healthPillLabel(p);
  const sPill = soldPill(p);
  const pills = [healthPill, sPill].filter(Boolean)
    .map(p => `<span class="pill ${p.cls}">${p.label}</span>`).join('');

  const marginStr = p.current !== null ? fmtPct(p.current, 1) : '—';
  const marginLabel = p.pending ? '' : 'plan margin';

  // Drift line
  let driftLine = '';
  if (p.pending) {
    driftLine = `<span class="pcard-arrow flat">~</span> waiting on data`;
  } else if (p.drift !== null && p.sold !== null) {
    const arrow = Math.abs(p.drift) <= 0.5 ? '~' : (p.drift < 0 ? '▲' : '▼');
    const cls = Math.abs(p.drift) <= 0.5 ? 'flat' : (p.drift < 0 ? 'up' : 'down');
    const sign = p.drift <= 0 ? '+' : '−';
    const pp = Math.abs(p.drift).toFixed(1);
    const burnStr = p.burn !== null ? ` · burn ${Math.round(p.burn)}%` : '';
    driftLine = `<span class="pcard-arrow ${cls}">${arrow}</span> ${sign}${pp}pp from sold (${fmtPct(p.sold, 1)})${burnStr}`;
  }

  // Progress bar
  const progressPct = p.budget && p.budget > 0 && p.spend !== null
    ? Math.min(100, (p.spend / p.budget) * 100)
    : 0;
  const spendStr = p.spend !== null ? fmtMoney(p.spend) : '$0';
  const budgetStr = p.budget !== null ? fmtMoney(p.budget) : '$0';
  const pctSpentStr = p.pctSpent !== null ? `${Math.round(p.pctSpent)}%` : '0%';

  // Foot: $ left, Over $, % done
  const remainVal = p.remaining !== null ? fmtMoney(p.remaining) : '—';
  const overVal = p.overBudget ? fmtMoney(-p.remaining) : '$0';
  const doneVal = p.pctDone !== null ? `${Math.round(p.pctDone)}%` : '—';

  const hasSubs = p.subitems && p.subitems.length > 0;
  const subsHtml = hasSubs
    ? `<div class="pcard-subs">
         <div class="subs-head">Deliverables (${p.subitems.length})</div>
         ${p.subitems.map(renderSubitem).join('')}
       </div>`
    : '';

  return `
    <div class="pcard-wrap" data-id="${p.id}">
      <div class="pcard ${cls}" onclick="toggleCard(this, event)">
        <div class="pcard-head">
          <div class="pcard-title-block">
            <div class="pcard-title"><a href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escape(p.name)}</a></div>
            <div class="pcard-sub">${subtitle}</div>
          </div>
          <div class="pcard-pills">${pills}</div>
        </div>

        <div class="pcard-margin-row">
          <span class="pcard-margin">${marginStr}</span>
          <span class="pcard-margin-label">${marginLabel}</span>
          <div class="pcard-drift">${driftLine}</div>
        </div>

        <div class="pcard-progress-row">
          <div class="pcard-progress-meta">
            <span><strong>${spendStr}</strong> spent of ${budgetStr}</span>
            <span class="right">${pctSpentStr}</span>
          </div>
          <div class="pcard-progress"><div class="pcard-progress-fill" style="width: ${progressPct}%"></div></div>
        </div>

        <div class="pcard-foot">
          <span class="pcard-foot-item"><span class="lbl">$ left</span><span class="val ${p.overBudget ? 'red' : ''}">${remainVal}</span></span>
          <span class="pcard-foot-item"><span class="lbl">Over</span><span class="val ${p.overBudget ? 'red' : 'muted'}">${overVal}</span></span>
          <span class="pcard-foot-item"><span class="lbl">Done</span><span class="val">${doneVal}</span></span>
          ${hasSubs ? `<span class="pcard-expand" id="exp-${p.id}">▸ ${p.subitems.length} deliverables</span>` : ''}
        </div>
      </div>
      ${subsHtml ? `<div class="pcard-sub-container" style="display:none">${subsHtml}</div>` : ''}
    </div>`;
}

function toggleCard(el, ev) {
  // Don't toggle when clicking on the project name link
  if (ev && ev.target.closest('a')) return;
  const wrap = el.closest('.pcard-wrap');
  if (!wrap) return;
  const container = wrap.querySelector('.pcard-sub-container');
  if (!container) return;
  const expanded = wrap.classList.toggle('expanded');
  container.style.display = expanded ? 'block' : 'none';
  const exp = wrap.querySelector('.pcard-expand');
  if (exp) exp.textContent = (expanded ? '▾ ' : '▸ ') + exp.textContent.replace(/^[▸▾]\s*/, '');
}

function renderDashboard(projects) {

  const isActive = g => g === ACTIVE_GROUP_ID;

  // Sort: worst (highest drift) first within each bucket

  const green   = active.filter(p => p.status === 'green').sort(byDrift);

  const overBudget = active.filter(p => p.overBudget).length;
  // Aggregate excludes pending so the portfolio number reflects projects with real data
  const assessable = active.filter(p => !p.pending);
  const agg = portfolioMargin(assessable);

  // Closed: sort by final margin descending (best closes first)
  const closedSorted = closed.slice().sort((a, b) => (b.current ?? -Infinity) - (a.current ?? -Infinity));

  const closedAgg = portfolioMargin(closed.filter(p => p.current !== null));

  const now = new Date();

  const day = weekStart.getDay();

  document.getElementById('last-updated').textContent =
    'Updated ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' · ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  // Attention list: red status OR over budget
  const attentionList = active.filter(p => p.status === 'red' || p.overBudget);

  document.getElementById('main-content').innerHTML = `
    <div class="toolbar">
      <button class="refresh-btn" id="refresh-btn" onclick="handleRefresh()">
        <span class="spin">↻</span> Refresh
      </button>
    </div>
    ${renderTopRow(agg, closedAgg, weekLabel)}
    ${renderStatRow(counts, agg.totalBudget, agg.totalSpend, agg.totalRemaining, assessable.length)}
    ${renderAttentionBanner(attentionList)}
    ${renderMarginChart(active)}
    ${section('red',     'Needs attention',    'red',   red,   false)}
    ${section('amber',   'Watch',              'amber', amber, false)}
    ${section('green',   'On track',           'green', green, true)}
    ${section('pending', 'Not yet assessable', 'grey',  pending.map(p => ({...p, status: 'grey'})), true)}
    ${section('closed',  'Recently closed',    'grey',  closedSorted.map(p => ({...p, status: 'done'})), true)}
    <div style="margin-top: 28px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
      <span>Live from Budget Forecast Board + Timely Sync Board · ${active.length} active · ${attentionList.length} alert${attentionList.length === 1 ? '' : 's'}</span>
      <span>Click any card to expand deliverables · click name to open in Monday</span>
    </div>
  `;
}

async function loadDashboard(token) {
  renderLoading();
  try {
    const budgetCols = [COL.health, COL.lead, COL.soldMargin, COL.planMargin, COL.burnMargin,
                        COL.totalBudget, COL.spend, COL.pctComplete];
    const timelyCols = [COL.tmHealth, COL.tmBudget, COL.tmSpend, COL.tmOverBy];
    const subCols    = [COL.subHealth, COL.subBudget, COL.subSpent, COL.subPctUsed, COL.subHours];

    const [budgetItems, timelyItems, subitemsByParent] = await Promise.all([
      fetchBoardItems(token, BUDGET_BOARD_ID, budgetCols),
      fetchBoardItems(token, TIMELY_BOARD_ID, timelyCols),
      fetchSubitemsByParent(token, TIMELY_BOARD_ID, subCols),
    ]);

    // Process raw rows
    const bfRows = budgetItems.map(processBudgetItem);
    const tmRows = timelyItems.map(processTimelyItem);

    // Index Timely rows by normalized name (active + closed both)
    const tmByName = {};
    for (const tm of tmRows) tmByName[normName(tm.name)] = tm;

    // Build subitem lookup by Timely parent id, processed
    const subsByTmId = {};
    for (const [parentId, subs] of Object.entries(subitemsByParent)) {
      subsByTmId[parentId] = subs.map(processSubitem);
    }

    // Track which Timely rows got matched so we can surface unmatched ones
    const matchedTmIds = new Set();
    const merged = [];

    for (const bf of bfRows) {
      const tm = tmByName[normName(bf.name)] || null;
      if (tm) matchedTmIds.add(tm.id);
      const subs = tm ? (subsByTmId[tm.id] || []) : [];
      merged.push(mergeProject(bf, tm, subs));
    }

    // Timely-only rows (active group) — projects tracked in Timely but not budgeted yet
    for (const tm of tmRows) {
      if (matchedTmIds.has(tm.id)) continue;
      if (tm.group !== ACTIVE_GROUP_ID) continue;
      const subs = subsByTmId[tm.id] || [];
      merged.push(mergeProject(null, tm, subs));
    }

    renderDashboard(merged);
  } catch (e) {
    renderError(e.message || String(e));
  }
}

async function handleRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('loading');
  const token = localStorage.getItem(STORAGE_KEY);
  if (!token) { renderTokenGate(); return; }
  await loadDashboard(token);
}

window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem(STORAGE_KEY);
  if (token) loadDashboard(token);
  else renderTokenGate();
});
</script>
