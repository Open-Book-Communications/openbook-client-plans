name: Refresh Dashboards

on:
  schedule:
    # Hourly on weekdays — covers 8am-5pm CT year-round regardless of DST
    # (UTC 13:00 = 8am CDT / 7am CST, UTC 22:00 = 5pm CDT / 4pm CST)
    - cron: "0 13-22 * * 1-5"
  workflow_dispatch: # Manual trigger from GitHub Actions tab

permissions:
  contents: write

# Force all JS-based actions onto Node 24 ahead of the June 2026 cutover.
# Some actions (e.g. setup-python) don't yet have a v6 release that ships
# with Node 24; this env var opts them in early. Safe to remove once every
# action below has a version that natively runs on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh dashboards
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python scripts/refresh-dashboards.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh dashboards [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push
          fi
